# File-sync map for BetaHuhn/repo-file-sync-action (driven by workflows/sync.yml).
# Changes merged to main open a "chore(ci): …" PR in every repo listed below.
#
# ROLLOUT COMPLETE 2026-07-15: all 17 repos active (pilots + batches 2–4).
# Onboarding a new repo = add it to the right group (group 1 unless it has a
# bespoke release pipeline) — see SETUP.md.
#
# NEVER add `deleteOrphaned: true` — repos mix their own scripts and workflows
# into the same directories; the sync must only ever write the paths listed here.

group:
  # ── Group 1: full set ────────────────────────────────────────────────────
  # Repos on the stock semantic-release config.
  - repos: |
      digitalnsw/reviewers
      digitalnsw/digitalnsw
      digitalnsw/attestation
      digitalnsw/nswds-email
      digitalnsw/awards
      digitalnsw/engagement
      digitalnsw/ictds-risk
      digitalnsw/images
      digitalnsw/nswds-public-sans
      digitalnsw/nswds-email-framework
      digitalnsw/nswds-email-starter
      digitalnsw/nswds-design
      digitalnsw/nswds-email-builder
      digitalnsw/data
      digitalnsw/nswds-community
      digitalnsw/nswds-signature
      digitalnsw/nswds-email-issues
    files:
      - source: scripts/
        dest: scripts/
      - source: commit-types.mjs
        dest: commit-types.mjs
      - source: commitlint.config.mjs
        dest: commitlint.config.mjs
      - source: git-conventional-commits.yaml
        dest: git-conventional-commits.yaml
      - source: release.config.mjs
        dest: release.config.mjs
      - source: repo-files/renovate.json
        dest: renovate.json
      - source: workflow-stubs/
        dest: .github/workflows/

  # ── Group 2a: nswds-ui ───────────────────────────────────────────────────
  # Monorepo publish + registry checks: keeps its own release.yml AND release
  # config (publishes with @semantic-release/npm enabled).
  - repos: |
      digitalnsw/nswds-ui
    files:
      - source: scripts/
        dest: scripts/
      - source: commit-types.mjs
        dest: commit-types.mjs
      - source: commitlint.config.mjs
        dest: commitlint.config.mjs
      - source: git-conventional-commits.yaml
        dest: git-conventional-commits.yaml
      - source: workflow-stubs/commitlint.yml
        dest: .github/workflows/commitlint.yml
      - source: workflow-stubs/validate-branch-name.yml
        dest: .github/workflows/validate-branch-name.yml
      - source: workflow-stubs/commit-types-sync.yml
        dest: .github/workflows/commit-types-sync.yml
      - source: workflow-stubs/ai-pr-title.yml
        dest: .github/workflows/ai-pr-title.yml
      - source: workflow-stubs/openai-pr-description.yml
        dest: .github/workflows/openai-pr-description.yml
      - source: workflow-stubs/ci.yml
        dest: .github/workflows/ci.yml
      - source: repo-files/renovate.json
        dest: renovate.json

  # ── Group 2b: nswds-tokens ───────────────────────────────────────────────
  # Like nswds-ui it keeps its own release.yml + release config, but its
  # .github/workflows/ci.yml is ALSO its own (lint/typecheck/test/validate
  # pipeline) — filename collision with the shared merge-gate stub, so that
  # stub lands as shared-ci.yml here. The "install / install" ruleset context
  # is job-based and unaffected by the filename.
  - repos: |
      digitalnsw/nswds-tokens
    files:
      - source: scripts/
        dest: scripts/
      - source: commit-types.mjs
        dest: commit-types.mjs
      - source: commitlint.config.mjs
        dest: commitlint.config.mjs
      - source: git-conventional-commits.yaml
        dest: git-conventional-commits.yaml
      - source: workflow-stubs/commitlint.yml
        dest: .github/workflows/commitlint.yml
      - source: workflow-stubs/validate-branch-name.yml
        dest: .github/workflows/validate-branch-name.yml
      - source: workflow-stubs/commit-types-sync.yml
        dest: .github/workflows/commit-types-sync.yml
      - source: workflow-stubs/ai-pr-title.yml
        dest: .github/workflows/ai-pr-title.yml
      - source: workflow-stubs/openai-pr-description.yml
        dest: .github/workflows/openai-pr-description.yml
      - source: workflow-stubs/ci.yml
        dest: .github/workflows/shared-ci.yml
      - source: repo-files/renovate.json
        dest: renovate.json

  # ── Group 3: nswds-app ───────────────────────────────────────────────────
  # Publishes @nswds/app via @semantic-release/npm, so it keeps its own
  # release.config.mjs — but the stock release workflow (stub) is fine.
  - repos: |
      digitalnsw/nswds-app
    files:
      - source: scripts/
        dest: scripts/
      - source: commit-types.mjs
        dest: commit-types.mjs
      - source: commitlint.config.mjs
        dest: commitlint.config.mjs
      - source: git-conventional-commits.yaml
        dest: git-conventional-commits.yaml
      - source: repo-files/renovate.json
        dest: renovate.json
      - source: workflow-stubs/
        dest: .github/workflows/

  # ── Group 4: ictds-portal-flows ──────────────────────────────────────────
  # Its release.yml is a Power Platform PROD DEPLOY pipeline (name collision —
  # never overwrite it). The shared release workflow lives in
  # semantic-release.yml, so the release stub is mapped there.
  - repos: |
      digitalnsw/ictds-portal-flows
    files:
      - source: scripts/
        dest: scripts/
      - source: commit-types.mjs
        dest: commit-types.mjs
      - source: commitlint.config.mjs
        dest: commitlint.config.mjs
      - source: git-conventional-commits.yaml
        dest: git-conventional-commits.yaml
      - source: release.config.mjs
        dest: release.config.mjs
      - source: workflow-stubs/commitlint.yml
        dest: .github/workflows/commitlint.yml
      - source: workflow-stubs/validate-branch-name.yml
        dest: .github/workflows/validate-branch-name.yml
      - source: workflow-stubs/commit-types-sync.yml
        dest: .github/workflows/commit-types-sync.yml
      - source: workflow-stubs/ai-pr-title.yml
        dest: .github/workflows/ai-pr-title.yml
      - source: workflow-stubs/openai-pr-description.yml
        dest: .github/workflows/openai-pr-description.yml
      - source: workflow-stubs/ci.yml
        dest: .github/workflows/ci.yml
      - source: workflow-stubs/release.yml
        dest: .github/workflows/semantic-release.yml
      - source: repo-files/renovate.json
        dest: renovate.json
