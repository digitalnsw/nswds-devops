name: Commitlint

on:
  pull_request:

permissions:
  contents: read

jobs:
  commitlint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0
      - uses: actions/setup-node@v6
        # Single source of truth: .nvmrc pins the Node version for local dev and CI.
        # (commitlint v21 requires Node >=22.12.0, which .nvmrc's 22 satisfies.)
        with:
          node-version-file: '.nvmrc'
      - run: npm clean-install
      - name: Validate PR commit messages
        run: >-
          npx commitlint
          --from ${{ github.event.pull_request.base.sha }}
          --to ${{ github.event.pull_request.head.sha }}
          --verbose
