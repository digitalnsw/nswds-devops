name: Commit type sync

# Fail the build if commit-types.mjs (the source of truth) and
# git-conventional-commits.yaml disagree on the allowed commit types. The YAML is
# the live config for the downstream git-conventional-commits CLI (and the shell
# tooling's offline fallback), so its type list must stay in lockstep with the
# source of truth. commit-types.mjs MUST be in the path filters below, otherwise
# editing it alone won't trigger this check and the two files can drift undetected.

on:
  pull_request:
    paths:
      - commit-types.mjs
      - git-conventional-commits.yaml
      - scripts/conventional-commit-config.sh
      - scripts/check-commit-types-sync.sh
  push:
    branches: [main]
    paths:
      - commit-types.mjs
      - git-conventional-commits.yaml
      - scripts/conventional-commit-config.sh
      - scripts/check-commit-types-sync.sh

permissions:
  contents: read

jobs:
  check:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup Node.js
        # Single source of truth: .nvmrc pins the Node version for local dev and CI.
        # (commitlint v21 requires Node >=22.12.0, which .nvmrc's 22 satisfies.)
        uses: actions/setup-node@v6
        with:
          node-version-file: '.nvmrc'

      # Install commitlint without touching the repo's manifest so the check
      # runs the same way in this repo (no package.json) and in consumer repos.
      - name: Install commitlint
        run: npm install --no-save @commitlint/cli @commitlint/config-conventional

      - name: Check commit type lists are in sync
        run: ./scripts/check-commit-types-sync.sh
