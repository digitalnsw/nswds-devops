# Reusable implementation — repos call this via the synced commit-types-sync.yml
# stub. The stub owns the path filters (workflow_call has none). Edit here;
# never in a consumer repo.
name: Commit type sync (reusable)

on:
  workflow_call:
    inputs:
      node-version:
        description: Node version used when the caller repo has no .nvmrc
        type: string
        default: '24'

permissions:
  contents: read

jobs:
  check:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup Node.js (.nvmrc)
        if: ${{ hashFiles('.nvmrc') != '' }}
        uses: actions/setup-node@v6
        with:
          node-version-file: '.nvmrc'
      - name: Setup Node.js (fallback)
        if: ${{ hashFiles('.nvmrc') == '' }}
        uses: actions/setup-node@v6
        with:
          node-version: ${{ inputs.node-version }}

      # Install commitlint without touching the repo's manifest so the check
      # runs the same way in this repo (no package.json) and in consumer repos.
      - name: Install commitlint
        run: npm install --no-save @commitlint/cli @commitlint/config-conventional

      - name: Check commit type lists are in sync
        run: ./scripts/check-commit-types-sync.sh
