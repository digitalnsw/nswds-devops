# Reusable implementation — repos call this via the synced ci.yml stub.
# Edit here; never in a consumer repo.
#
# This is the merge gate rulesets require (context: "install / install").
# It ports nswds-design's local CI workflow: the pull_request event checks
# out the test merge of PR + base, so a bad conflict resolution or a
# corrupted lockfile fails here before it can land on main.
name: CI (reusable)

on:
  workflow_call:
    inputs:
      node-version:
        description: Node version used when the caller repo has no .nvmrc
        type: string
        default: '24'

permissions:
  contents: read

jobs:
  install:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      # npm ci reports a lockfile with conflict markers as "no package-lock.json",
      # which is misleading — catch markers in any tracked file with a clear error.
      - name: Check for unresolved merge conflict markers
        run: |
          if git grep -nE '^(<{7}|>{7}) '; then
            echo "❌ Unresolved merge conflict markers found in the files above."
            exit 1
          fi

      - name: Setup Node.js (.nvmrc)
        if: ${{ hashFiles('.nvmrc') != '' }}
        uses: actions/setup-node@v6
        with:
          node-version-file: '.nvmrc'
      - name: Setup Node.js (fallback)
        if: ${{ hashFiles('.nvmrc') == '' }}
        uses: actions/setup-node@v6
        with:
          node-version: ${{ inputs.node-version }}

      # Fails on any manifest/lockfile mismatch — the check Snyk-corrupted
      # lockfiles used to sail past when nothing enforced it.
      - name: Install dependencies
        run: npm clean-install

      # App repos whose builds need deploy-time env (Next.js page-data
      # collection hits auth/DB) opt out with a repo Actions variable:
      # Settings → Secrets and variables → Actions → Variables →
      # CI_SKIP_BUILD=true. The conflict-marker and lockfile gates above
      # still run everywhere — only the build is skipped.
      - name: Build
        if: ${{ vars.CI_SKIP_BUILD != 'true' }}
        run: npm run build --if-present

  # Lint gate. Added after nswds-app#418 showed a fatally broken `eslint .`
  # (ESLint 10 plugin crash) merging with all checks green — nothing here ran
  # lint. `--if-present` no-ops in repos without a lint script; repos whose
  # lint is temporarily red can opt out with a repo Actions variable
  # (Settings → Secrets and variables → Actions → Variables → CI_SKIP_LINT=true).
  # Not required by rulesets unless a repo adds the "install / lint" context.
  lint:
    if: ${{ vars.CI_SKIP_LINT != 'true' }}
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - name: Setup Node.js (.nvmrc)
        if: ${{ hashFiles('.nvmrc') != '' }}
        uses: actions/setup-node@v6
        with:
          node-version-file: '.nvmrc'
      - name: Setup Node.js (fallback)
        if: ${{ hashFiles('.nvmrc') == '' }}
        uses: actions/setup-node@v6
        with:
          node-version: ${{ inputs.node-version }}

      - name: Install dependencies
        run: npm clean-install

      - name: Lint
        run: npm run lint --if-present

  # Test gate: runs the repo's vitest suite when a vitest config exists.
  # Same silent-gap rationale as lint — nswds-app's storybook browser suite
  # never ran on PRs. Browser-mode suites need a Playwright browser, installed
  # only when the repo depends on playwright. Opt out with CI_SKIP_TESTS=true.
  # Not required by rulesets unless a repo adds the "install / test" context.
  test:
    if: ${{ vars.CI_SKIP_TESTS != 'true' }}
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - name: Setup Node.js (.nvmrc)
        if: ${{ hashFiles('.nvmrc') != '' }}
        uses: actions/setup-node@v6
        with:
          node-version-file: '.nvmrc'
      - name: Setup Node.js (fallback)
        if: ${{ hashFiles('.nvmrc') == '' }}
        uses: actions/setup-node@v6
        with:
          node-version: ${{ inputs.node-version }}

      - name: Install dependencies
        if: ${{ hashFiles('vitest.config.*') != '' }}
        run: npm clean-install

      - name: Install Playwright browser (browser-mode vitest)
        if: ${{ hashFiles('vitest.config.*') != '' }}
        run: |
          if node -e "const p=require('./package.json');process.exit((p.devDependencies?.playwright||p.dependencies?.playwright)?0:1)"; then
            npx playwright install chromium --with-deps
          else
            echo "No playwright dependency — skipping browser install."
          fi

      - name: Run vitest
        if: ${{ hashFiles('vitest.config.*') != '' }}
        run: npx vitest run

      - name: No vitest config
        if: ${{ hashFiles('vitest.config.*') == '' }}
        run: echo "No vitest config — nothing to run."
