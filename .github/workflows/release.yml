# This repo dogfoods its own reusable workflow via a local reference.
# Consumer repos get the equivalent stub from workflow-stubs/.
name: Release

on:
  push:
    branches: [main]

permissions:
  contents: write
  issues: write
  pull-requests: write
  id-token: write

jobs:
  release:
    uses: ./.github/workflows/reusable-release.yml
    secrets: inherit
