# Pushes the shared files out to every consumer repo as PRs.
# Target map: .github/sync.yml. Auth: GitHub App (see SETUP.md).
name: Sync shared files to repos

on:
  push:
    branches: [main]
    paths:
      - scripts/**
      - workflow-stubs/**
      - commit-types.mjs
      - commitlint.config.mjs
      - git-conventional-commits.yaml
      - release.config.mjs
      - .github/sync.yml
  workflow_dispatch:

permissions:
  contents: read

jobs:
  sync:
    runs-on: ubuntu-latest
    # One sync at a time; a queued push supersedes an unstarted older one.
    concurrency:
      group: repo-sync
      cancel-in-progress: false
    steps:
      - name: Mint GitHub App token
        id: app
        uses: actions/create-github-app-token@v2
        with:
          # Both stored as repository secrets (the App ID isn't sensitive, but
          # it was saved there; reading it as a secret is equally fine).
          app-id: ${{ secrets.SYNC_APP_ID }}
          private-key: ${{ secrets.SYNC_APP_PRIVATE_KEY }}
          owner: digitalnsw

      # Pinned to the v1.21.1 commit — upstream maintenance has slowed, and an
      # unreviewed update here would have write access to every consumer repo.
      - name: Sync files to consumer repos
        uses: BetaHuhn/repo-file-sync-action@8b92be3375cf1d1b0cd579af488a9255572e4619 # v1.21.1
        with:
          GH_PAT: ${{ steps.app.outputs.token }}
          CONFIG_PATH: .github/sync.yml
          # Conventional prefix: passes commitlint in target repos and never
          # triggers a semantic-release.
          COMMIT_PREFIX: 'chore(ci): '
          COMMIT_EACH_FILE: false
          # Must satisfy the targets' branch policy — chore/repo-sync* is
          # exempted in scripts/branch-name-config.sh (REPO_SYNC_REGEX).
          BRANCH_PREFIX: chore/repo-sync
          PR_LABELS: repo-sync
          SKIP_PR: false
