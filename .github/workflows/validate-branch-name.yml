# This repo dogfoods its own reusable workflow via a local reference.
# Consumer repos get the equivalent stub from workflow-stubs/.
name: Validate Branch Name

on:
  pull_request:
    types: [opened, edited, reopened]

permissions:
  contents: read

jobs:
  check-branch-name:
    uses: ./.github/workflows/reusable-validate-branch-name.yml
    secrets: inherit
