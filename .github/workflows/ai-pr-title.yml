# This repo dogfoods its own reusable workflow via a local reference.
# Consumer repos get the equivalent stub from workflow-stubs/.
name: AI PR Title Generator

on:
  pull_request:
    types: [opened, reopened, synchronize, edited]

permissions:
  contents: read
  pull-requests: write

jobs:
  generate-title:
    uses: ./.github/workflows/reusable-ai-pr-title.yml
    secrets: inherit
