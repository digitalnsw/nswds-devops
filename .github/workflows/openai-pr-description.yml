# This repo dogfoods its own reusable workflow via a local reference.
# Consumer repos get the equivalent stub from workflow-stubs/.
name: Autofill PR description

on:
  pull_request:
    types: [opened]

permissions:
  contents: read
  pull-requests: write

jobs:
  openai-pr-description:
    uses: ./.github/workflows/reusable-openai-pr-description.yml
    secrets: inherit
